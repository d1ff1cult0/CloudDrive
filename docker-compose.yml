# Vault — self-hosted cloud storage.
#
# Quick start:
#   1. (optional) cp .env.example .env  and set STORAGE_PATH to where files live,
#      e.g. STORAGE_PATH=/mnt/ext_storage   (defaults to ./storage if unset)
#   2. docker compose up -d
#   3. open http://localhost:3033 — the FIRST account you register becomes admin.
#
# Everything else (database, auth secret, migrations, default storage backend)
# is configured automatically.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault
    volumes:
      - vault-pgdata:/var/lib/postgresql/data
    # Not published to the host: the app talks to Postgres over the internal
    # Docker network. (For local `pnpm dev`, run your own Postgres — see README.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vault"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies DB migrations and seeds the default storage backend, then exits.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault?schema=public
      STORAGE_PATH: /data/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3033:3000"
    environment:
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault?schema=public
      # Public URL of the app. Set to your Cloudflare Tunnel hostname in prod.
      APP_URL: ${APP_URL:-http://localhost:3033}
      # Leave empty to auto-generate a persistent secret on first start.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
    volumes:
      # The ONE setting that matters for local storage: where your files live.
      - ${STORAGE_PATH:-./storage}:/data/storage
      - vault-config:/data/config
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/login',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  vault-pgdata:
  vault-config:
